    <div class="container">

        <h2>Favorilerim</h2>

        <div id="liste"></div>

    </div>

    <script>
       function listeyiYazdir() {
    let veri = JSON.parse(localStorage.getItem("favoriler")) || [];

    let alan = document.getElementById("liste");

    if (veri.length === 0) {
        alan.innerHTML = "<p>Henüz favori yok.</p>";
        return;
    }

    alan.innerHTML = "";

    veri.forEach(item => {
        alan.innerHTML += "<p>❤️ " + item + "</p>";
    });
}

listeyiYazdir();

    </script>

</body>
